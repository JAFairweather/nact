<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nact — sign</title>
<meta name="description" content="Enact a single proposed action by signing it with your own key. What you see is exactly what you sign.">
<link rel="icon" href="/favicon.svg">
<!-- The /sign Mini-App (hardening P5, nact#11). A focused, deep-linkable signer
     for ONE proposal, behind the same nostr-signed gate as the console — the
     target of a Telegram card's "Verify & enact" web_app button. It renders the
     proposal with the SHARED faithful render (lib/reveal.mjs) and the SHARED
     tier ceremony (lib/tiers.mjs), so a signing surface can never show a softer
     picture than the review console. Critical kinds keep their stronger
     ceremony: no one-tap, an explicit confirm, signed by YOUR key. The runtime
     (nact.mjs) refuses confirm:false for critical, so this bar is enforced on
     both ends. Your key never enters this page — it stays in your extension or
     remote signer (bunker). No CDN in the sign-in path (see app.html). -->
<style>
:root{
  --ink:#0b0906; --panel:#14100a; --line:#2a2317; --line2:#3a3020;
  --text:#f4efe4; --dim:#9c927f; --faint:#6f6555; --gold:#c39a56;
  --accent:#c98f4f; --accent-bright:#e6b877;
  --low:#6fa88a; --elev:#d8b45a; --crit:#d1705f;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(120% 80% at 50% -10%,#171009 0%,var(--ink) 55%);
  color:var(--text);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:max(16px,env(safe-area-inset-top)) 18px 40px}
.brand{display:flex;align-items:center;gap:11px;padding:12px 0 6px}
.seal{width:34px;height:34px;flex:none}
.brand .t{font-weight:650;font-size:17px;letter-spacing:-.01em}
.brand .t small{color:var(--dim);font-weight:400;font-size:12.5px}
.mono{font-family:var(--mono)}
.card{background:linear-gradient(180deg,color-mix(in srgb,var(--panel) 70%,var(--ink)),var(--ink));
  border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:14px}
.muted{color:var(--dim);font-size:13.5px}
.kv{font-family:var(--mono);font-size:12px;color:var(--faint);word-break:break-all}
.badge{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
  border-radius:999px;padding:3px 9px;border:1px solid currentColor}
.b-low{color:var(--low)} .b-elev{color:var(--elev)} .b-crit{color:var(--crit)}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.who{display:flex;align-items:center;gap:10px;margin-bottom:12px}
h3{margin:0 0 2px;font-size:16px}
.content{white-space:pre-wrap;word-break:break-word;background:#0d0a06;border:1px solid var(--line);
  border-radius:9px;padding:12px;margin:12px 0;font-size:14.5px}
.content .lint{border-radius:3px;padding:0 2px}
.content .lint.hidden{font-family:var(--mono);font-size:11px;background:color-mix(in srgb,var(--crit) 22%,transparent);border:1px solid var(--crit);color:var(--accent-bright);vertical-align:1px;margin:0 1px}
.content .lint.confuse{background:color-mix(in srgb,var(--crit) 30%,transparent);border:1px solid var(--crit);color:#fff;box-shadow:0 0 0 1px var(--crit)}
.tags{font-family:var(--mono);font-size:11.5px;color:var(--dim);word-break:break-all;margin-top:8px}
.warn{color:var(--crit);font-size:13px;margin-top:8px}
.fp{font-family:var(--mono);font-size:12px;color:var(--gold);word-break:break-all;margin-top:12px;
  border-top:1px solid var(--line);padding-top:10px}
.req{font-size:12.5px;color:var(--elev);margin-top:6px}
.btn{font-family:var(--sans);font-size:14.5px;font-weight:600;border-radius:10px;padding:12px 16px;
  cursor:pointer;border:1px solid var(--line2);background:none;color:var(--text);width:100%;margin-top:10px}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--ink)}
.btn.bunker{border-color:var(--crit);color:var(--accent-bright)}
.btn.ghost{color:var(--dim)}
.btn:disabled{opacity:.5;cursor:default}
.note{font-size:12.5px;color:var(--faint);margin-top:14px;text-align:center}
input{width:100%;background:#0d0a06;border:1px solid var(--line2);border-radius:8px;padding:11px 12px;
  color:var(--text);font-family:var(--mono);font-size:12px;margin-top:8px}
.status{font-size:13px;color:var(--dim);margin-top:12px;white-space:pre-wrap}
</style>
<script type="importmap">
{
  "imports": {
    "nostr-tools": "./assets/vendor/nostr-tools-bunker.mjs?v=2",
    "nostr-tools/pool": "./assets/vendor/nostr-tools-bunker.mjs?v=2",
    "nostr-tools/nip46": "./assets/vendor/nostr-tools-bunker.mjs?v=2",
    "nave-connect": "./lib/nave-connect.mjs?v=2",
    "nave-reveal": "./lib/reveal.mjs?v=1",
    "nact-tiers": "./lib/tiers.mjs?v=1"
  }
}
</script>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="seal" id="seal"></div>
    <div class="t">Nact <small>· sign</small></div>
  </div>
  <div id="view">
    <div class="card"><div class="muted">Loading…</div></div>
  </div>
  <div class="note">The agent proposes; you enact it by signing. Your key never enters this page.</div>
</div>

<script type="module">
import { nip07Signer, nip46Signer, nostrConnectSigner } from 'nave-connect'
import { revealContent } from 'nave-reveal'
import { ceremonyFor } from 'nact-tiers'

const SEAL = `<svg viewBox="0 0 100 100" aria-hidden="true" style="width:100%;height:100%">
  <rect x="2" y="2" width="96" height="96" rx="20" fill="#0b0906" stroke="#c39a56" stroke-width="2"/>
  <g fill="none" stroke="#c39a56" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <rect x="24" y="50" width="52" height="30" rx="3"/><line x1="24" y1="62" x2="76" y2="62" stroke-width="2.6"/><line x1="24" y1="71" x2="76" y2="71" stroke-width="2.6"/></g>
  <g transform="rotate(-15 26 45)"><rect x="24" y="35" width="52" height="12" rx="2.5" fill="none" stroke="#c39a56" stroke-width="4"/>
    <clipPath id="s2"><rect x="24" y="35" width="52" height="12" rx="2.5"/></clipPath>
    <g clip-path="url(#s2)" fill="#c39a56"><polygon points="21,47 31,47 43,35 33,35"/><polygon points="37,47 47,47 59,35 49,35"/><polygon points="53,47 63,47 75,35 65,35"/><polygon points="69,47 79,47 91,35 81,35"/></g></g>
</svg>`
document.getElementById('seal').innerHTML = SEAL

// If we're inside a Telegram Mini-App, let it size itself — but never hard-depend
// on the Telegram SDK (no CDN in the sign-in path). Plain web works identically.
try { window.Telegram?.WebApp?.ready?.(); window.Telegram?.WebApp?.expand?.() } catch {}

const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]))
const view = document.getElementById('view')
const card = (inner) => { view.innerHTML = `<div class="card">${inner}</div>` }

// Which proposal? id from ?id= or #id= (a Telegram web_app button URL carries it).
const params = new URLSearchParams(location.search || (location.hash || '').replace(/^#/, '?'))
const WANT_ID = params.get('id') || ''

// ---- the nostr-signed gate: connect a signer, then NIP-98-sign every call ---
let SIGNER = null
async function sha256hex(s) { const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2, '0')).join('') }
async function nip98(method, path, bodyStr) {
  const tags = [['u', location.origin + path], ['method', method]]
  if (bodyStr) tags.push(['payload', await sha256hex(bodyStr)])
  const ev = await SIGNER.signEvent({ kind: 27235, created_at: Math.floor(Date.now() / 1000), tags, content: '' })
  return 'Nostr ' + btoa(JSON.stringify(ev))
}
async function api(method, path, body) {
  const s = body ? JSON.stringify(body) : ''
  const headers = { authorization: await nip98(method, path, s) }
  if (s) headers['content-type'] = 'application/json'
  const r = await fetch(path, { method, headers, body: s || undefined })
  if (!r.ok) throw new Error(path + ' → ' + r.status)
  return r.json()
}

function tierBadge(t) { return `<span class="badge b-${t === 'critical' ? 'crit' : t === 'elevated' ? 'elev' : 'low'}">${t}</span>` }

// ---- connect UI ------------------------------------------------------------
function askConnect(reason) {
  const hasExt = !!window.nostr
  card(`
    <h3>Sign in to enact</h3>
    <div class="muted" style="margin:6px 0 4px">${esc(reason || 'Connect as the approver — your key proves the enactment is yours.')}</div>
    ${hasExt ? `<button class="btn primary" id="c-ext">Connect browser extension</button>` : ''}
    <button class="btn" id="c-nc">Connect a remote signer (nsec.app)</button>
    <input id="c-bunker" placeholder="or paste bunker://…" value="${esc(localStorage.getItem('nact.bunker.uri') || '')}">
    <button class="btn ghost" id="c-bunker-go">Connect via bunker://</button>
    <div class="status" id="c-status"></div>`)
  const st = document.getElementById('c-status')
  const log = (m) => { st.textContent = m }
  document.getElementById('c-ext')?.addEventListener('click', async () => {
    try { const s = nip07Signer(); await s.getPublicKey(); SIGNER = s; afterConnect() }
    catch (e) { log('Extension: ' + e.message) }
  })
  document.getElementById('c-nc').addEventListener('click', async () => {
    try {
      log('Generating a pairing link…')
      const s = nostrConnectSigner({
        appName: 'Nact', appUrl: location.origin, perms: ['sign_event:27235', 'get_public_key'],
        clientSecret: localStorage.getItem('nact.bunker.clientkey') || undefined,
        onUri: (uri) => { log('In nsec.app: Connect app → paste:\n\n' + uri) },
        onLog: log,
      })
      await s.getPublicKey(); SIGNER = s; afterConnect()
    } catch (e) { log('Remote signer: ' + e.message) }
  })
  document.getElementById('c-bunker-go').addEventListener('click', async () => {
    const uri = document.getElementById('c-bunker').value.trim()
    if (!uri.startsWith('bunker://')) { log('Paste a bunker:// string from your signer.'); return }
    try {
      log('Connecting to your signer…')
      const s = nip46Signer(uri, { clientSecret: localStorage.getItem('nact.bunker.clientkey') || undefined, onAuthUrl: (u) => log('Approve in your signer: ' + u) })
      await s.getPublicKey(); localStorage.setItem('nact.bunker.uri', uri)
      if (s.clientSecretHex) localStorage.setItem('nact.bunker.clientkey', s.clientSecretHex)
      SIGNER = s; afterConnect()
    } catch (e) { log('bunker: ' + e.message) }
  })
}

async function afterConnect() { card(`<div class="muted">Loading the proposal…</div>`); loadOne() }

// ---- load + render the single proposal -------------------------------------
async function loadOne() {
  let st
  try { st = await api('GET', '/api/state') }
  catch (e) {
    if (String(e.message).includes('401') || String(e.message).includes('403'))
      return askConnect('That key is not an approver on this runtime. Connect the Director key.')
    return card(`<div class="warn">Could not reach the runtime: ${esc(e.message)}</div>`)
  }
  const q = (st.queue || []).find((x) => x.id === WANT_ID)
  if (!WANT_ID) return card(`<div class="warn">No proposal id in the link.</div><div class="muted" style="margin-top:6px">Open /sign from an approval card, or add <span class="mono">?id=…</span>.</div>`)
  if (!q) return card(`<div class="muted">Proposal <span class="mono">${esc(WANT_ID)}</span> is not in the queue — already handled, or expired.</div>`)
  renderProposal(q)
}

function renderProposal(q) {
  const tier = q.tier || 'low'
  const cer = ceremonyFor(tier)
  const rep = q.report || {}
  const draft = q.draft || {}
  const fp = q.fingerprint || ''
  const warns = (rep.warnings || []).map((w) => `<div class="warn">⚠️ ${esc(w)}</div>`).join('')
  const okLabel = cer.needsDevice ? '🔐 Sign & enact (your key)' : '✅ Approve & enact'
  view.innerHTML = `<div class="card">
    <div class="between"><div class="who">
      <div><h3>Enact as ${esc(q.identity || '—')}</h3><div class="kv">${esc((q.npub || '').slice(0, 28))}…</div></div>
    </div>${tierBadge(tier)}</div>
    <div class="muted mono" style="margin-top:4px">${esc(rep.kindLabel || 'kind ' + draft.kind)}</div>
    <div class="content">${revealContent(draft.content || '')}</div>
    ${(draft.tags && draft.tags.length) ? `<div class="tags">tags: ${revealContent(draft.tags.map((t) => t.join(':')).join('   '))}</div>` : ''}
    ${warns}
    ${q.context ? `<div class="muted" style="margin-top:8px"><i>context (not published): ${esc(q.context)}</i></div>` : ''}
    <div class="fp">id ${esc(fp.slice(0, 24))}…<br><span class="muted">verify this matches what your signer shows before you approve</span></div>
    <div class="req">${esc(cer.requirement)}</div>
    <button class="btn ${cer.needsDevice ? 'bunker' : 'primary'}" id="do-ok">${okLabel}</button>
    <button class="btn ghost" id="do-no">Reject</button>
    <div class="status" id="do-status"></div>`
  const st = document.getElementById('do-status')
  document.getElementById('do-no').addEventListener('click', () => enact(q, 'no'))
  document.getElementById('do-ok').addEventListener('click', () => {
    // Critical kinds keep their stronger ceremony: never a bare tap — a
    // deliberate confirm, which becomes confirm:true (the runtime refuses
    // confirm:false for critical, so this is enforced on both ends).
    if (cer.needsConfirm && !confirm(`${rep.kindLabel || 'This'} is a critical action.\n\nIt replaces or destroys standing state and cannot be undone with a tap. Sign and enact it?`)) return
    enact(q, 'ok', cer.needsConfirm)
  })

  async function enact(q, verb, confirmFlag) {
    const btnO = document.getElementById('do-ok'), btnN = document.getElementById('do-no')
    btnO.disabled = btnN.disabled = true
    st.textContent = verb === 'ok' ? 'Signing…' : 'Rejecting…'
    try {
      const r = await api('POST', '/api/enact', { id: q.id, verb, confirm: confirmFlag === true })
      if (r.enacted) card(`<h3>✅ Enacted</h3><div class="kv" style="margin-top:8px">${esc((r.event?.id || '').slice(0, 24))}… · ${r.relays} relay${r.relays === 1 ? '' : 's'}</div>`)
      else if (r.why === 'rejected') card(`<h3>Rejected</h3><div class="muted" style="margin-top:6px">The proposal was discarded.</div>`)
      else if (r.needsConfirm) { st.textContent = 'This action needs an explicit confirm.'; btnO.disabled = btnN.disabled = false }
      else { st.textContent = 'Not enacted: ' + (r.why || 'unknown') + (r.error ? ` — ${r.error}` : ''); btnO.disabled = btnN.disabled = false }
    } catch (e) {
      st.textContent = 'Failed: ' + e.message
      btnO.disabled = btnN.disabled = false
    }
  }
}

// Boot: connect first (the gate), then load the one proposal.
askConnect()
</script>
</body>
</html>
