<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nact — control plane (V1)</title>
<meta name="description" content="The Nact control plane: construct approval channels, set risk tiers, review the queue, and revoke an agent's authority to act.">
<link rel="icon" href="/favicon.svg">
<style>
:root{
  --ink:#0b0906; --panel:#14100a; --panel2:#1b1409; --line:#2a2317; --line2:#3a3020;
  --text:#f4efe4; --dim:#9c927f; --faint:#6f6555; --gold:#c39a56; --gold-bright:#e2c079;
  --accent:#c98f4f; --accent-bright:#e6b877;
  --low:#6fa88a; --elev:#d8b45a; --crit:#d1705f;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(120% 80% at 50% -10%,#171009 0%,var(--ink) 55%);
  color:var(--text);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:var(--accent-bright);text-decoration:none}
.wrap{max-width:1000px;margin:0 auto;padding:0 20px}
.mono{font-family:var(--mono)}

/* top bar */
header{border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;
  background:color-mix(in srgb,var(--ink) 88%,transparent);backdrop-filter:blur(8px)}
.bar{display:flex;align-items:center;gap:14px;padding:14px 0}
.seal{width:38px;height:38px;flex:none}
.title{font-weight:650;font-size:19px;letter-spacing:-.01em}
.title small{color:var(--dim);font-weight:400;font-size:13px}
.spacer{flex:1}
.pill{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  border:1px solid var(--line2);color:var(--dim);border-radius:999px;padding:4px 11px}
.who{font-family:var(--mono);font-size:12px;color:var(--faint)}

/* demo banner */
.demo{background:color-mix(in srgb,var(--accent) 12%,transparent);border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);
  border-radius:8px;padding:9px 14px;margin:16px 0 4px;font-size:13px;color:var(--accent-bright)}

/* tabs */
nav.tabs{display:flex;gap:4px;margin:18px 0 8px;flex-wrap:wrap}
.tab{font-family:var(--mono);font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;
  padding:9px 15px;border:1px solid var(--line);border-radius:8px;color:var(--dim);cursor:pointer;background:none}
.tab:hover{border-color:var(--line2);color:var(--text)}
.tab.on{border-color:var(--accent);color:var(--accent-bright);background:color-mix(in srgb,var(--accent) 10%,transparent)}
.tab .n{display:inline-block;margin-left:6px;background:var(--accent);color:var(--ink);border-radius:999px;
  font-size:10px;padding:0 6px;font-weight:700;vertical-align:1px}

/* cards */
section{padding:8px 0 40px}
.grid{display:grid;gap:14px}
.card{background:linear-gradient(180deg,color-mix(in srgb,var(--panel) 70%,var(--ink)),var(--ink));
  border:1px solid var(--line);border-radius:12px;padding:18px}
.card h3{margin:0 0 2px;font-size:16px}
.muted{color:var(--dim);font-size:13.5px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.between{justify-content:space-between}
.kv{font-family:var(--mono);font-size:12px;color:var(--faint);word-break:break-all}

/* badges */
.badge{font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;
  padding:3px 9px;border-radius:999px;border:1px solid currentColor;white-space:nowrap}
.b-low{color:var(--low)} .b-elev{color:var(--elev)} .b-crit{color:var(--crit)}
.b-ok{color:var(--low)} .b-rej{color:var(--crit)} .b-off{color:var(--faint)}
.avatar{width:34px;height:34px;border-radius:50%;flex:none;display:grid;place-items:center;
  border:1.5px solid color-mix(in srgb,var(--accent) 55%,transparent);color:var(--accent);
  background:radial-gradient(circle at 50% 38%,color-mix(in srgb,var(--accent) 22%,transparent),transparent 70%);
  font-family:var(--mono);font-weight:700;font-size:14px}

/* proposal render */
.prop .action{background:#0d0a06;border:1px solid var(--line);border-radius:10px;padding:14px;margin:12px 0}
.prop .klabel{font-family:var(--mono);font-size:12px;color:var(--accent-bright);letter-spacing:.04em;margin-bottom:6px}
.prop .content{white-space:pre-wrap;word-break:break-word;font-size:15px}
.prop .tags{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:10px}
.warn{color:var(--crit);font-size:13px;margin-top:8px;display:flex;gap:7px;align-items:flex-start}
.ctx{color:var(--dim);font-size:13px;font-style:italic;margin-top:8px}
.fp{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:10px}
.hint{font-size:12px;color:var(--dim);margin-top:2px}

/* buttons */
.acts{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.btn{font-family:var(--mono);font-size:12.5px;letter-spacing:.05em;padding:10px 16px;border-radius:8px;
  border:1px solid var(--line2);color:var(--text);background:none;cursor:pointer}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--ink);font-weight:700}
.btn.primary:hover{background:var(--accent-bright)}
.btn.bunker{background:none;border-color:var(--crit);color:var(--accent-bright)}
.btn.bunker:hover{background:color-mix(in srgb,var(--crit) 16%,transparent)}
.btn.ghost{color:var(--dim)}
.btn.danger{border-color:color-mix(in srgb,var(--crit) 60%,transparent);color:var(--crit)}
.btn.danger:hover{background:color-mix(in srgb,var(--crit) 14%,transparent)}
.empty{color:var(--faint);text-align:center;padding:44px;border:1px dashed var(--line);border-radius:12px}

/* identity<->channel wiring */
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;
  border:1px solid var(--line2);border-radius:999px;padding:3px 10px;color:var(--dim)}
.chip.on{color:var(--accent-bright);border-color:color-mix(in srgb,var(--accent) 45%,transparent)}
.chip.warnchip{color:var(--crit);border-color:color-mix(in srgb,var(--crit) 55%,transparent)}
.label{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-top:12px}
.matrix{width:100%;border-collapse:collapse;font-size:13.5px}
.matrix th,.matrix td{border:1px solid var(--line);padding:10px 12px;text-align:center}
.matrix th:first-child,.matrix td:first-child{text-align:left}
.matrix thead th{color:var(--dim);font-family:var(--mono);font-size:11px;letter-spacing:.05em;font-weight:600}
.matrix thead th small{display:block;font-weight:400;color:var(--faint);text-transform:none;letter-spacing:0}
.matrix .yes{color:var(--low);font-weight:700}
.matrix .no{color:var(--faint)}
.matrix td{padding:8px}
.cell{cursor:pointer;background:none;border:1px solid var(--line2);border-radius:8px;width:44px;height:36px;font-size:16px;color:var(--faint);transition:all .12s}
.cell:hover{border-color:var(--accent);color:var(--accent-bright)}
.cell.on{color:var(--low);border-color:color-mix(in srgb,var(--low) 55%,transparent);background:color-mix(in srgb,var(--low) 13%,transparent)}
.cell.stale{color:var(--crit);border-color:color-mix(in srgb,var(--crit) 45%,transparent)}

/* create forms */
.form{display:flex;flex-direction:column;gap:10px;margin-top:14px;max-width:480px}
.form input,.form select{background:#0d0a06;border:1px solid var(--line2);border-radius:8px;
  padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:14px;width:100%}
.form input::placeholder{color:var(--faint)}
.form label{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);margin-bottom:-4px}
.form .note{font-size:12px;color:var(--faint);margin-top:2px}
.form button{align-self:flex-start;margin-top:4px}

/* policy table */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
th{color:var(--dim);font-family:var(--mono);font-size:11px;letter-spacing:.09em;text-transform:uppercase;font-weight:600}
td .tierbtn{cursor:pointer;background:none;border:1px solid currentColor;border-radius:999px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px}
.req{font-family:var(--mono);font-size:11.5px;color:var(--faint)}
footer{color:var(--faint);font-size:12.5px;text-align:center;padding:26px 0 44px;border-top:1px solid var(--line)}
</style>
<!-- Every specifier resolves to a LOCAL file, so the vendored nave-connect runs
     unmodified with no CDN anywhere in the sign-in path. (nvoy maps these at
     esm.sh; a control plane shouldn't need a CDN to let you in.) Rebuild the
     bundle with `npm run build:bunker`.

     BUMP ?v= WHENEVER app.html, lib/*.mjs OR the bundle CHANGES. These four
     files must load as one unit: a page cached from before an upgrade paired
     with fresh modules (or the reverse) fails at module resolution, which here
     is the sign-in path. Cache-Control:no-cache makes NEW responses revalidate
     but cannot reach an entry a browser already holds — only a changed URL
     can. Bare specifiers keep the token in this one block. -->
<script type="importmap">
{
  "imports": {
    "nostr-tools": "./assets/vendor/nostr-tools-bunker.mjs?v=2",
    "nostr-tools/pool": "./assets/vendor/nostr-tools-bunker.mjs?v=2",
    "nostr-tools/nip46": "./assets/vendor/nostr-tools-bunker.mjs?v=2",
    "nave-connect": "./lib/nave-connect.mjs?v=2",
    "nave-titlebar": "./lib/nave-titlebar.mjs?v=2"
  }
}
</script>
</head>
<body>
<!-- The shared Nave titlebar (components/nave-titlebar.mjs), rendered by the
     module script below. The seal SVG moves into it as a trusted literal; the
     bespoke #director / #connect cluster this replaced is gone. -->
<header id="titlebar"></header>

<div class="wrap">
  <div class="demo" id="banner">Not connected — nothing is loaded. <b>Connect</b> as a Director to reach Nactor (the live Nact runtime) behind the NIP-98 gate: a browser extension, or a remote signer (<b>bunker://</b>, e.g. nsec.app on iPhone). Your key never enters this page.</div>
  <nav class="tabs" id="tabs"></nav>
  <section id="view"></section>
</div>
<footer>Nact — the agent proposes, you enact it by signing · <a href="/">nact.nave.pub</a></footer>

<script>
// ---- seed state (stand-in for the runtime's real data) -------------------
const S = {
  director: null,                               // the connected Director — set on connect, never seeded
  // Directors — the human decision-maker(s) who approve or reject. Part of the
  // config, not the box's env. (Distinct from Noir's AI "Director".)
  directors: [],
  // The Nactor this config targets — the runtime that applies it. Can be this
  // box or a remote one; the app just points at its address.
  nactorAddress: 'https://nact.nave.pub/api',
  identities: [],
  channels: [],
  // risk tiers (defaults mirror src/inspect.mjs)
  policy: [
    { kind:1, label:'Note', tier:'low' },
    { kind:7, label:'Reaction', tier:'low' },
    { kind:6, label:'Repost', tier:'low' },
    { kind:9734, label:'Zap request', tier:'elevated' },
    { kind:0, label:'Profile / metadata edit', tier:'critical' },
    { kind:3, label:'Contact list (replaces follows)', tier:'critical' },
    { kind:5, label:'Deletion request', tier:'critical' },
    { kind:10002, label:'Relay list', tier:'critical' },
  ],
  // Queue and history stay EMPTY until the runtime fills them. This app used to
  // ship fabricated pending approvals and enactment history as seed data, which
  // rendered identically to the real thing — an approval queue that invents
  // approvals is the one thing a control plane must never do. Disconnected now
  // means empty, and every tab says so.
  queue: [],
  history: [],
};
let tab = 'queue';
let LIVE = false;
// The active Director signer: { signEvent(evt) } — either a NIP-07 browser
// extension or a NIP-46 remote signer (bunker, e.g. nsec.app on iPhone). Both
// return a fully signed event; the key never enters this page either way.
let SIGNER = null;

// ---- live wiring: NIP-98-signed calls to the runtime (opt-in) ------------
const KLBL={0:'Profile / metadata edit',1:'Note',3:'Contact list',5:'Deletion request',6:'Repost',7:'Reaction',9734:'Zap request',10002:'Relay list'};
async function sha256hex(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')}
async function nip98(method,path,bodyStr){const tags=[['u',location.origin+path],['method',method]];if(bodyStr)tags.push(['payload',await sha256hex(bodyStr)]);const ev=await SIGNER.signEvent({kind:27235,created_at:Math.floor(Date.now()/1000),tags,content:''});return 'Nostr '+btoa(JSON.stringify(ev))}
async function api(method,path,body){const s=body?JSON.stringify(body):'';const headers={authorization:await nip98(method,path,s)};if(s)headers['content-type']='application/json';const r=await fetch(path,{method,headers,body:s||undefined});if(!r.ok)throw new Error(path+' → '+r.status);return r.json()}
function mapState(st){
  S.director=st.director?st.director.slice(0,12)+'…':S.director;
  S.nactorAddress=st.nactorAddress||S.nactorAddress;
  S.nactorNpub=st.nactorNpub||S.nactorNpub||'';
  S.directors=(st.directors||[]).map(np=>({npub:np,label:np.slice(0,12)+'…',bootstrap:np===st.bootstrap,verified:true}));
  S.identities=st.identities.map(i=>({key:i.key,handle:i.handle,npub:i.npub||'',signer:i.signer,status:i.status,source:i.source,activated:i.activated||null}));
  S.channels=st.channels||[];
  S.policy=Object.entries(st.tiers||{}).sort((a,b)=>a[0]-b[0]).map(([k,t])=>({kind:+k,label:KLBL[+k]||('kind '+k),tier:t}));
  S.queue=(st.queue||[]).map(q=>({id:q.id,identity:q.identity,kind:q.draft.kind,klabel:(q.report&&q.report.kindLabel)||('kind '+q.draft.kind),tier:q.tier,content:q.draft.content,tags:q.draft.tags||[],ctx:q.context||'',fp:(q.fingerprint||'').slice(0,16),warns:(q.report&&q.report.warnings)||[]}));
  S.history=(st.history||[]).map(h=>{const when=h.when?new Date(h.when).toLocaleString():'—';
    if(h.t==='activated')return {t:'activated',identity:h.identity,by:(h.by||'').slice(0,14),when};
    if(h.t==='grant-load'||h.t==='grant-update'||h.t==='grant-drop')return {t:h.t,credential:h.credential,generation:h.generation??null,when};
    if(h.t==='entitlement-gain'||h.t==='entitlement-loss')return {t:h.t,identity:h.identity,credential:h.credential,when};
    return {t:'enact',id:h.id,identity:h.identity,klabel:h.kindLabel||'—',outcome:h.outcome,fp:(h.fingerprint||'').slice(0,4)+'…',when,relays:h.detail?(parseInt(h.detail)||0):0}});
  S.entitlements=st.entitlements||{};
}
async function refresh(){ mapState(await api('GET','/api/state')); await loadProfiles(); draw(); }
// Resolve kind-0 profiles for every Director + agent identity so the plane
// renders avatars/names instead of bare pubkeys. Best-effort — never blocks.
async function loadProfiles(){
  try{
    if(!(window.__nact && window.__nact.fetchProfiles)) return;
    const ids=[...S.identities.map(i=>i.npub), ...S.directors.map(d=>d.npub)].filter(Boolean);
    S.profiles = await window.__nact.fetchProfiles(ids);
  }catch{ /* leave S.profiles as-is; monograms render */ }
}
async function syncConfig(){ if(!LIVE)return; try{ await api('PUT','/api/config',{directors:S.directors.map(d=>d.npub),nactorAddress:S.nactorAddress,channels:S.channels,tiers:Object.fromEntries(S.policy.map(p=>[String(p.kind),p.tier]))}); }catch(e){ alert('config save failed: '+e.message); } }
// Ask how to sign: a NIP-07 browser extension (desktop) or a NIP-46 remote
// signer (a bunker:// string from e.g. nsec.app — the path for iPhone/iPad,
// where Safari has no extension). Resolves to the chosen method or null.
function chooseSigner(){
  return new Promise(resolve=>{
    const hasExt = !!window.nostr;
    const saved = localStorage.getItem('nact.bunker.uri') || '';
    const ov=$(`<div style="position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.72);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)">
      <div class="card" style="width:min(470px,94vw);max-height:90vh;overflow:auto">
        <h3 style="margin-bottom:2px">Connect as a Director</h3>
        <div class="muted" style="margin-bottom:14px">Sign in with your key — it never leaves your signer.</div>
        ${hasExt
          ? `<button class="btn primary" id="cs-ext" style="width:100%;margin-bottom:6px">Use browser extension (NIP-07)</button>
             <div class="hint" style="margin-bottom:14px">Recommended — Alby, nos2x, or any NIP-07 extension. Fast and reliable.</div>`
          : `<div class="hint" style="margin-bottom:14px;border:1px solid var(--line2);border-radius:8px;padding:10px 12px">No NIP-07 extension detected. Install <b>Alby</b> (getalby.com) or <b>nos2x</b>, then reload this page — it's the recommended way to connect.</div>`}
        <button class="btn" id="cs-nc" style="width:100%;margin-bottom:6px">Connect a remote signer (nsec.app)</button>
        <div class="hint" style="margin-bottom:8px">Your key stays in an app like <b>nsec.app</b>; Nact makes a link you paste into it → <b>Connect app</b>. Note: this needs the signer's own relay (relay.nsec.app) reachable from your browser — if it's blocked or down, use an extension above.</div>
        <details style="margin-top:4px"><summary class="label" style="cursor:pointer;list-style:revert">advanced — paste a bunker:// instead</summary>
          <input id="cs-bunker" placeholder="bunker://…" value="${esc(saved)}" style="width:100%;margin-top:8px;background:#0d0a06;border:1px solid var(--line2);border-radius:8px;padding:11px 12px;color:var(--text);font-family:var(--mono);font-size:12px">
          <button class="btn" id="cs-bunker-go" style="margin-top:8px">Connect via bunker://</button>
        </details>
        <div class="row" style="justify-content:flex-end;margin-top:14px"><button class="btn ghost" id="cs-cancel">Cancel</button></div>
      </div></div>`);
    document.body.appendChild(ov);
    const done=v=>{ov.remove();resolve(v)};
    ov.querySelector('#cs-ext')?.addEventListener('click',()=>done({kind:'nip07'}));
    ov.querySelector('#cs-nc').addEventListener('click',()=>done({kind:'nostrconnect'}));
    ov.querySelector('#cs-bunker-go').addEventListener('click',()=>{const s=ov.querySelector('#cs-bunker').value.trim(); if(!s.startsWith('bunker://')){alert('Paste a bunker:// connection string from your signer.');return;} done({kind:'bunker',str:s})});
    ov.querySelector('#cs-cancel').addEventListener('click',()=>done(null));
    ov.addEventListener('click',e=>{if(e.target===ov)done(null)});
  });
}
// nostrconnect flow: show the generated link + steps, wait for the signer to
// connect back. Matches nsec.app's "Connect app" (you paste INTO nsec.app).
function connectViaNostrConnect(){
  return new Promise((resolve,reject)=>{
    const ov=$(`<div style="position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.82)">
      <div class="card" style="width:min(500px,94vw);max-height:92vh;overflow:auto">
        <h3 style="margin-bottom:6px">Connect your signer</h3>
        <ol class="muted" style="margin:0 0 10px 18px;padding:0;font-size:13.5px;line-height:1.7">
          <li>In <b>nsec.app</b> tap <b>Connect app</b>.</li>
          <li>Paste the link below and confirm.</li>
        </ol>
        <div class="label" style="margin-top:0">nostrconnect link</div>
        <textarea id="nc-uri" readonly rows="3" style="width:100%;margin:6px 0;background:#0d0a06;border:1px solid var(--line2);border-radius:8px;padding:10px 12px;color:var(--accent-bright);font-family:var(--mono);font-size:11px;resize:none">generating…</textarea>
        <div class="row" style="gap:10px"><button class="btn primary" id="nc-copy">Copy link</button><span class="hint" id="nc-status">waiting for nsec.app to connect…</span></div>
        <div class="label" style="margin-top:12px">diagnostics</div>
        <pre id="nc-log" style="margin:4px 0 0;background:#0d0a06;border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--dim);font-size:10.5px;max-height:150px;overflow:auto;white-space:pre-wrap;word-break:break-all"></pre>
        <div class="row" style="justify-content:flex-end;margin-top:14px"><button class="btn ghost" id="nc-cancel">Cancel</button></div>
      </div></div>`);
    document.body.appendChild(ov);
    let settled=false; const finish=(fn,v)=>{if(settled)return;settled=true;clearTimeout(t);ov.remove();fn(v)};
    const t=setTimeout(()=>finish(reject,new Error('No connection after 3 min. In nsec.app, tap Connect app and paste the link. If you use a VPN/filter it may block the signer relay.')),185000);
    ov.querySelector('#nc-cancel').onclick=()=>finish(reject,new Error('cancelled'));
    const ta=ov.querySelector('#nc-uri'), logEl=ov.querySelector('#nc-log');
    const log=m=>{ const t=new Date().toLocaleTimeString(); logEl.textContent+=`${t}  ${m}\n`; logEl.scrollTop=logEl.scrollHeight; try{console.log('[nact-nc]',m)}catch{} };
    ov.querySelector('#nc-copy').onclick=()=>{ta.select();try{navigator.clipboard.writeText(ta.value)}catch{};document.execCommand&&document.execCommand('copy');ov.querySelector('#nc-status').textContent='copied — paste it in nsec.app';};
    window.__nact.nostrConnect((uri)=>{ ta.value=uri; }, log)
      .then(conn=>finish(resolve,conn)).catch(e=>finish(reject,e));
  });
}
// Drive a NIP-46 connect with a visible status: surface the signer's approval
// URL as a real clickable link (never a popup, which browsers block), tell the
// user to keep their signer open, and fail loudly after 60s instead of hanging.
function connectWithStatus(bunkerStr){
  return new Promise((resolve,reject)=>{
    const ov=$(`<div style="position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.8)">
      <div class="card" style="width:min(440px,94vw);text-align:center">
        <h3 style="margin-bottom:8px">Connecting to your signer…</h3>
        <div class="muted" id="cw-msg">Keep <b>nsec.app</b> open in another tab, signed in — the request reaches it over a relay, and it can only answer while it's running.</div>
        <div id="cw-auth" style="margin-top:14px"></div>
        <div class="row" style="justify-content:center;margin-top:16px"><button class="btn ghost" id="cw-cancel">Cancel</button></div>
      </div></div>`);
    document.body.appendChild(ov);
    let settled=false;
    const finish=(fn,v)=>{ if(settled)return; settled=true; clearTimeout(t); ov.remove(); fn(v); };
    const t=setTimeout(()=>finish(reject,new Error('No response from your signer after 60s.\n\n• Make sure nsec.app is open (in another tab) and signed in.\n• Try generating a fresh bunker:// in nsec.app and pasting the new one.\n• A VPN or content filter can block the signer relay — turn it off if you have one.')),60000);
    ov.querySelector('#cw-cancel').onclick=()=>finish(reject,new Error('cancelled'));
    window.__nact.bunker(bunkerStr,(url)=>{
      if(!url) return;
      ov.querySelector('#cw-msg').innerHTML='Your signer wants you to <b>approve this connection</b> — open it here:';
      ov.querySelector('#cw-auth').innerHTML=`<a class="btn primary" href="${esc(url)}" target="_blank" rel="noopener" style="display:inline-block;text-decoration:none">Approve in your signer ↗</a>`;
    }).then(conn=>finish(resolve,conn)).catch(e=>finish(reject,e));
  });
}
async function goLive(){
  if(LIVE) return;
  const choice = await chooseSigner();
  if(!choice) return;
  if(!window.__nact || !window.__nact.ready){ alert('Sign-in module is still loading — reload and try again.'); return; }
  try{
    if(choice.kind==='nip07'){
      if(!window.nostr) throw new Error('No browser extension (window.nostr) found. Install Alby or nos2x and reload.');
      SIGNER = await window.__nact.extension();
    } else if(choice.kind==='nostrconnect'){
      SIGNER = await connectViaNostrConnect();       // overlay shows the link + diagnostics
    } else {
      SIGNER = await connectWithStatus(choice.str);  // overlay shows status + approval link
    }
    await goneLive();
  }catch(e){
    SIGNER=null; setSignedOut();
    alert('Connect failed: '+e.message+'\n\nIf using a remote signer, make sure you approved the connection there, and that the runtime is deployed.');
  }
}

// Shared tail for a fresh sign-in and a resumed session alike: load the real
// state, flip the banner, and put the identity in the titlebar.
async function goneLive(){
  await refresh(); LIVE=true;
  try{ window.__nact.remember(SIGNER); }catch{}
  const b=document.getElementById('banner');
  b.innerHTML='<b>\u25cf LIVE</b> — connected to Nactor as a Director. Approve / Reject / routing changes are real.';
  b.style.borderColor='var(--low)'; b.style.color='var(--low)';
  const npub = await window.__nact.npubOf(SIGNER);
  window.__nact.titlebar.update('#titlebar', { npub, kind: SIGNER.kind, onSignIn: null, onRefresh: refresh, onLogout: signOut });
  draw();
}
function setSignedOut(){
  window.__nact.titlebar.update('#titlebar', { npub:null, kind:null, onSignIn: goLive, onRefresh:null, onLogout:null });
}
async function signOut(){
  try{ await SIGNER?.close?.(); }catch{}
  SIGNER=null; LIVE=false;
  try{ window.__nact.forget(); }catch{}
  // Drop everything the runtime gave us — signed out must look exactly like
  // never-connected, not like a stale snapshot of someone's real queue.
  S.director=null; S.directors=[]; S.identities=[]; S.channels=[]; S.queue=[]; S.history=[]; S.profiles={};
  const b=document.getElementById('banner');
  b.innerHTML='Not connected — nothing is loaded. <b>Connect</b> as a Director to reach Nactor (the live Nact runtime) behind the NIP-98 gate: a browser extension, or a remote signer (<b>bunker://</b>, e.g. nsec.app on iPhone). Your key never enters this page.';
  b.style.borderColor=''; b.style.color='';
  setSignedOut(); draw();
}

const $ = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild};
const esc = s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const tierBadge = t=>`<span class="badge b-${t==='critical'?'crit':t==='elevated'?'elev':'low'}">${t}</span>`;
const idOf = k=>S.identities.find(i=>i.key===k)||{handle:k};
const chPurpose = c=>c.purpose||'approval';
const approvalChannels = ()=>S.channels.filter(c=>chPurpose(c)==='approval');
const commsChannels = ()=>S.channels.filter(c=>chPurpose(c)==='comms');
const channelsFor = k=>approvalChannels().filter(c=>c.covers.includes(k)); // approval routes for an identity
const commsChannelFor = k=>commsChannels().find(c=>c.owner===k||(c.covers||[]).includes(k));
const chanShort = c=>c.kind.split(' ')[0];   // "Telegram" / "NIP-59"
// Identity resolution — real avatar / name / nip05 from the kind-0 profile
// (populated by loadProfiles → window.__nact.fetchProfiles), keyed by npub.
// Falls back to a monogram so an unprofiled key still reads clean.
const profileOf = np => (np && S.profiles && S.profiles[np]) || null;
const dispName = (p, fb) => (p && (p.display_name||p.name)) || fb;
function avatarHTML(p, ch){
  return p && p.picture
    ? `<img class="avatar" src="${esc(p.picture)}" alt="" width="34" height="34" loading="lazy" style="object-fit:cover;background:#0d0a06">`
    : `<span class="avatar">${esc(String(ch||'?')[0].toUpperCase())}</span>`;
}

function renderTabs(){

  const defs=[['queue','Queue',S.queue.length],['identities','Agent Identities'],['channels','Channels'],['routing','Routing'],['directors','Directors'],['deployment','Deployment'],['policy','Policy'],['history','History']];
  for(const [k,label,n] of defs){
    const b=$(`<button class="tab ${k===tab?'on':''}">${label}${n?`<span class="n">${n}</span>`:''}</button>`);
    b.onclick=()=>{tab=k;draw()}; t.appendChild(b);
  }
}

    : `<button class="btn primary" data-ok="${p.id}">✅ Approve &amp; enact</button><button class="btn ghost" data-no="${p.id}">Reject</button>`;
  return `<div class="card prop">
    <div class="row between"><div class="row">${avatarHTML(profileOf(idn.npub), idn.handle)}

      <table><tr><th>Kind</th><th>Action</th><th>Tier</th><th>Required path</th></tr>
      ${S.policy.map((p,i)=>`<tr><td class="mono">${p.kind}</td><td>${esc(p.label)}</td>
        <td><button class="tierbtn ${p.tier==='critical'?'b-crit':p.tier==='elevated'?'b-elev':'b-low'}" data-tier="${i}">${p.tier}</button></td>
        <td class="req">${p.tier==='critical'?'sign-on-device':p.tier==='elevated'?'approve after full tags shown':'one-tap approve'}</td></tr>`).join('')}
      </table></div>`;
  }
  if(tab==='history'){
    const ent=S.entitlements||{};
    const entRows=Object.entries(ent).filter(([,creds])=>creds&&creds.length);
    const standing = entRows.length ? `<div class="card" style="margin-bottom:14px">
      <div class="label" style="margin-top:0">Standing credential grants</div>
      <div class="muted" style="margin:2px 0 10px;font-size:12.5px">What each identity holds a live grant for right now (the credential-lifecycle log lives in Nvoy's Ledger). Names only — never values.</div>
      ${entRows.map(([k,creds])=>`<div class="row" style="gap:8px;margin:6px 0">${avatarHTML(profileOf(idOf(k).npub), idOf(k).handle)}
        <b style="min-width:120px">${esc(idOf(k).handle)}</b>
        <div class="chips" style="margin:0">${creds.map(c=>`<span class="chip on">🔑 ${esc(c)}</span>`).join('')}</div></div>`).join('')}</div>` : '';
    h=`<div class="muted" style="margin:0 0 12px">The audit of everything that happened on <b>this runtime</b> — Director activations, event enactments, and what it loaded or dropped from Director-signed grants, newest first. (The issuance-side lifecycle — who granted what, rotations — is the Nvoy Ledger's job.)</div>
      ${standing}
      ${S.history.length ? `<div class="grid">${S.history.map(e=>{
        if(e.t==='activated')return `<div class="card"><div class="row between">
        <div class="row">${avatarHTML(profileOf(idOf(e.identity).npub), idOf(e.identity).handle)}
          <div><h3 style="font-size:15px">✍ activated · ${esc(idOf(e.identity).handle)}</h3>
          <div class="kv">Director authorized this key by signature${e.by?` (${esc(e.by)}…)`:''} · ${esc(e.when)}</div></div></div>
        <span class="badge b-ok">activated</span></div></div>`;
        if(e.t==='grant-load'||e.t==='grant-update'||e.t==='grant-drop')return `<div class="card"><div class="row between">
        <div><h3 style="font-size:15px">🔑 ${e.t==='grant-load'?'credential loaded from grant':e.t==='grant-update'?'credential updated from grant':'credential dropped — grant revoked'} · <span class="mono">${esc(e.credential||'')}</span></h3>
          <div class="kv">read from the relays by this runtime${e.generation!=null?` · gen ${e.generation}`:''} · ${esc(e.when)}</div></div>
        <span class="badge ${e.t==='grant-drop'?'b-rej':'b-ok'}">${e.t.slice(6)}</span></div></div>`;
        if(e.t==='entitlement-gain'||e.t==='entitlement-loss')return `<div class="card"><div class="row between">
        <div class="row">${avatarHTML(profileOf(idOf(e.identity).npub), idOf(e.identity).handle)}
          <div><h3 style="font-size:15px">🔑 entitlement ${e.t==='entitlement-gain'?'gained':'lost'} · ${esc(idOf(e.identity).handle)}</h3>
          <div class="kv">Director grant for <span class="mono">${esc(e.credential||'')}</span> ${e.t==='entitlement-gain'?'verified on-box':'no longer readable (revoked or rotated)'} · ${esc(e.when)}</div></div></div>
        <span class="badge ${e.t==='entitlement-gain'?'b-ok':'b-rej'}">${e.t==='entitlement-gain'?'gained':'lost'}</span></div></div>`;
        return `<div class="card"><div class="row between">
        <div class="row">${avatarHTML(profileOf(idOf(e.identity).npub), idOf(e.identity).handle)}
          <div><h3 style="font-size:15px">${esc(e.klabel)} · ${esc(idOf(e.identity).handle)}</h3>
          <div class="kv">id ${esc(e.fp)} · ${esc(e.when)}${e.outcome==='enacted'?` · ${e.relays} relays`:''}</div></div></div>
        <span class="badge ${e.outcome==='enacted'?'b-ok':'b-rej'}">${esc(e.outcome)}</span></div></div>`}).join('')}</div>`
        : `<div class="empty">${LIVE?'No activations, enactments, or grant events recorded yet on this runtime.':'Not connected — <b>Connect</b> as a Director to load history.'}</div>`}`;
  }
  v.innerHTML=h;
  // wire actions
  v.querySelectorAll('[data-ok]').forEach(b=>b.onclick=()=>decide(b.dataset.ok,'enacted'));
  v.querySelectorAll('[data-no]').forEach(b=>b.onclick=()=>decide(b.dataset.no,'rejected'));
  v.querySelectorAll('[data-revoke-id]').forEach(b=>b.onclick=()=>{const i=S.identities.find(x=>x.key===b.dataset.revokeId);i.status='revoked';draw()});
  v.querySelectorAll('[data-activate]').forEach(b=>b.onclick=async()=>{
    if(!LIVE){alert('Connect as a Director first.');return;}
    b.disabled=true;b.textContent='sign in your signer…';
    try{ await api('POST','/api/activate-identity',{name:b.dataset.activate}); await refresh(); }
    catch(e){ alert('activate failed: '+e.message); b.disabled=false; b.textContent='✍ Activate (sign)'; }
  });
  v.querySelectorAll('[data-revoke-ch]').forEach(b=>b.onclick=()=>{const c=S.channels.find(x=>x.id===b.dataset.revokeCh);c.status='severed';draw();syncConfig()});
  v.querySelectorAll('[data-wire]').forEach(b=>b.onclick=()=>{const [ik,cid]=b.dataset.wire.split('|');
    const c=S.channels.find(x=>x.id===cid);const at=c.covers.indexOf(ik);
    if(at<0)c.covers.push(ik);else c.covers.splice(at,1);draw();syncConfig()});
  // create identity
  const sig=document.getElementById('ni-signer');
  if(sig) sig.onchange=()=>{document.getElementById('ni-bunker').style.display=sig.value==='bunker'?'block':'none'};
  const nic=document.getElementById('ni-create');
  if(nic) nic.onclick=()=>{
    const handle=(document.getElementById('ni-handle').value||'').trim()||'new@nave.pub';
    const key=handle.split('@')[0].toLowerCase().replace(/[^a-z0-9]/g,'')||('id'+S.identities.length);
    const signer=document.getElementById('ni-signer').value;
    const fakeNpub='npub1'+Array.from({length:38},()=>'0123456789acdefghjklmnpqrstuvwxyz'[Math.floor(Math.random()*33)]).join('');
    S.identities.push({key,handle,npub:fakeNpub,signer,status:'active'});
    tab='identities';draw();
  };
  // create channel
  const ncc=document.getElementById('nc-create');
  if(ncc) ncc.onclick=()=>{
    const name=(document.getElementById('nc-name').value||'').trim()||'New channel';
    const type=document.getElementById('nc-type').value;
    const approver=(document.getElementById('nc-approver').value||'').trim()||'—';
    S.channels.push({id:'ch'+S.channels.length+Date.now().toString(36).slice(-3),name,kind:type,approver,covers:[],status:'active'});
    tab='channels';draw();
  };
  v.querySelectorAll('[data-tier]').forEach(b=>b.onclick=()=>{const p=S.policy[+b.dataset.tier];
    p.tier={low:'elevated',elevated:'critical',critical:'low'}[p.tier];draw();syncConfig()});
  // Nactor address + Directors
  const nas=document.getElementById('na-save');
  if(nas) nas.onclick=()=>{S.nactorAddress=(document.getElementById('na-addr').value||'').trim();syncConfig()};
  const nda=document.getElementById('nd-add');
  if(nda) nda.onclick=()=>{
    const npub=(document.getElementById('nd-npub').value||'').trim();
    if(!/^npub1[0-9a-z]{20,}$/.test(npub)){alert('Enter a valid npub1… key.');return;}
    const label=(document.getElementById('nd-label').value||'').trim()||npub.slice(0,12)+'…';
    if(S.directors.some(d=>d.npub===npub)){alert('That Director is already added.');return;}
    S.directors.push({npub,label,bootstrap:false,verified:false});draw();syncConfig();
  };
  v.querySelectorAll('[data-rm-dir]').forEach(b=>b.onclick=()=>{
    S.directors=S.directors.filter(d=>d.npub!==b.dataset.rmDir||d.bootstrap);draw();syncConfig();});
}
async function decide(id,outcome){
  if(LIVE){
    try{ await api('POST','/api/enact',{id,verb:outcome==='enacted'?'ok':'no'}); await refresh(); }
    catch(e){ alert('enact failed: '+e.message); }
    return;
  }
  const i=S.queue.findIndex(p=>p.id===id); if(i<0)return;
  const p=S.queue.splice(i,1)[0];
  S.history.unshift({id:p.id,identity:p.identity,klabel:p.klabel,outcome,fp:p.fp.slice(0,4)+'…'+p.fp.slice(-2),when:'just now',relays:outcome==='enacted'?3:0});
  draw();
}
// Boot. Draw IMMEDIATELY so the page is never blank — if the sign-in module
// fails to load, you still get a readable (signed-out) control plane with a
// clear reason, rather than an empty document.
draw();
function boot(){
  window.__nact.titlebar.render('#titlebar', {
    appName: 'Nact', tagline: 'control plane', sealSvg: window.__nact.titlebar.seal,
    npub: null, onSignIn: goLive, signInLabel: '\u25c9 Connect',
  });
  // A remembered session resumes in the background — a reload shouldn't cost
  // you a re-pairing ceremony.
  window.__nact.resume().then(async s=>{
    if(!s) return;
    SIGNER = s;
    try{ await goneLive(); }
    catch{ SIGNER=null; setSignedOut(); }   // stale pairing → signed-out, never half-live
  }).catch(()=>{});
}
if(window.__nact && window.__nact.ready) boot();
else {
  window.addEventListener('nact:ready', boot, { once:true });
  // If the module never arrives (blocked, bad MIME, syntax error), say so where
  // the Connect button would have been, instead of leaving a dead header.
  setTimeout(()=>{
    if(window.__nact && window.__nact.ready) return;
    const b=document.getElementById('banner');
    if(b) b.innerHTML='<b>Sign-in module did not load.</b> The control plane is readable but cannot connect. Check the browser console, then reload.';
    document.getElementById('titlebar').innerHTML='<div class="wrap bar"><div class="title">Nact <small>\u00b7 control plane</small></div></div>';
  }, 6000);
}
</script>
<!-- Sign-in bridge. The crypto is NOT implemented here any more: it comes from
     the shared nave-connect module (canonical in the luke repo, vendored into
     lib/). This file only adapts it to the app's non-module script and keeps
     nact's own diagnostics overlays, which are worth keeping — they are the
     difference between "no ack" and "no relay". -->
<script type="module">
import { nip07Signer, nip46Signer, nostrConnectSigner,
         serializeSession, parseSession } from 'nave-connect';
import { renderTitlebar, updateTitlebar } from 'nave-titlebar';
import { SimplePool, nip19 } from 'nostr-tools';

const SEAL = `<svg viewBox="0 0 100 100" aria-hidden="true" style="width:100%;height:100%">
  <rect x="2" y="2" width="96" height="96" rx="20" fill="#0b0906" stroke="#c39a56" stroke-width="2"/>
  <g fill="none" stroke="#c39a56" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <rect x="24" y="50" width="52" height="30" rx="3"/><line x1="24" y1="62" x2="76" y2="62" stroke-width="2.6"/><line x1="24" y1="71" x2="76" y2="71" stroke-width="2.6"/></g>
  <g transform="rotate(-15 26 45)"><rect x="24" y="35" width="52" height="12" rx="2.5" fill="none" stroke="#c39a56" stroke-width="4"/>
    <clipPath id="ntbseal"><rect x="24" y="35" width="52" height="12" rx="2.5"/></clipPath>
    <g clip-path="url(#ntbseal)" fill="#c39a56"><polygon points="21,47 31,47 43,35 33,35"/><polygon points="37,47 47,47 59,35 49,35"/><polygon points="53,47 63,47 75,35 65,35"/><polygon points="69,47 79,47 91,35 81,35"/></g></g>
</svg>`;

const REMEMBER = 'nact.session';   // same `remember` slot shape the other apps use

window.__nact = window.__nact || {};
window.__nact.titlebar = { render: renderTitlebar, update: updateTitlebar, seal: SEAL };

// The three sign-in methods, all returning nave-connect's uniform signer shape
// ({ kind, getPublicKey, signEvent, … }) so the app never branches on method.
window.__nact.extension = async function(){
  const s = nip07Signer();
  await s.getPublicKey();            // runs Alby's trust ceremony now, not on first sign
  return s;
};
window.__nact.nostrConnect = function(onUri, log){
  return nostrConnectSigner({
    appName: 'Nact', appUrl: location.origin,
    perms: ['sign_event:27235','get_public_key'],
    clientSecret: localStorage.getItem('nact.bunker.clientkey') || undefined,
    onUri, onLog: log,
  });
};
window.__nact.bunker = async function(bunkerStr, onauth){
  const s = nip46Signer((bunkerStr||'').trim(), {
    clientSecret: localStorage.getItem('nact.bunker.clientkey') || undefined,
    onAuthUrl: onauth,
  });
  await s.getPublicKey();            // nip46Signer is lazy — force the connect here
  localStorage.setItem('nact.bunker.uri', (bunkerStr||'').trim());
  return s;
};

// Remember the session so a reload reconnects without re-pairing. A
// nostrconnect pairing hands back a synthesized bunker:// for exactly this.
window.__nact.remember = function(signer){
  try{
    if(signer.kind === 'nip07') localStorage.setItem(REMEMBER, serializeSession('nip07'));
    else if(signer.bunkerUri || localStorage.getItem('nact.bunker.uri')){
      localStorage.setItem(REMEMBER, serializeSession('nip46', {
        uri: signer.bunkerUri || localStorage.getItem('nact.bunker.uri'),
        clientSecretHex: signer.clientSecretHex,
      }));
    }
    if(signer.clientSecretHex) localStorage.setItem('nact.bunker.clientkey', signer.clientSecretHex);
  }catch{ /* private-mode storage — sign-in still works, it just won't persist */ }
};
window.__nact.forget = function(){ try{ localStorage.removeItem(REMEMBER); }catch{} };
window.__nact.resume = async function(){
  let sess = null;
  try{ sess = parseSession(localStorage.getItem(REMEMBER)); }catch{ return null }
  if(!sess) return null;
  if(sess.kind === 'nip07'){ try{ return await window.__nact.extension() }catch{ return null } }
  if(sess.kind === 'nip46'){
    try{ const s = nip46Signer(sess.uri, { clientSecret: sess.clientSecret }); await s.getPublicKey(); return s }
    catch{ return null }
  }
  return null;
};
window.__nact.npubOf = async function(signer){
  try{ return nip19.npubEncode(await signer.getPublicKey()) }catch{ return null }
};

// Resolve kind-0 profiles for a set of npubs (Directors + agent identities), so
// the control plane renders real avatars / names / nip05 instead of bare pubkeys
// — the same identity resolution Nvoy does. Best-effort: a slow or unreachable
// relay never blocks the UI (raced against a timeout).
window.__nact.fetchProfiles = async function(npubs, ms=3000){
  const list=[...new Set((npubs||[]).filter(Boolean))];
  const hexToNpub={};
  for(const np of list){ try{ const h=np.startsWith('npub')?nip19.decode(np).data:np; hexToNpub[h]=np; }catch{} }
  const authors=Object.keys(hexToNpub);
  const out={};
  if(!authors.length) return out;
  const RELAYS=['wss://relay.damus.io','wss://nos.lol','wss://relay.primal.net'];
  const pool=new SimplePool();
  try{
    const evs=await Promise.race([
      pool.querySync(RELAYS,{kinds:[0],authors}),
      new Promise(res=>setTimeout(()=>res([]),ms)),
    ]);
    for(const ev of (evs||[])){
      const np=hexToNpub[ev.pubkey]; if(!np) continue;
      const cur=out[np];
      if(!cur||ev.created_at>cur._at){ try{ const p=JSON.parse(ev.content); p._at=ev.created_at; out[np]=p; }catch{} }
    }
  }catch{}
  try{ pool.close(RELAYS); }catch{}
  return out;
};
window.__nact.ready = true;
window.dispatchEvent(new Event('nact:ready'));
</script>
