<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nact — control plane (V1)</title>
<meta name="description" content="The Nact control plane: construct approval channels, set risk tiers, review the queue, and revoke an agent's authority to act.">
<link rel="icon" href="/favicon.svg">
<style>
:root{
  --ink:#0b0906; --panel:#14100a; --panel2:#1b1409; --line:#2a2317; --line2:#3a3020;
  --text:#f4efe4; --dim:#9c927f; --faint:#6f6555; --gold:#c39a56; --gold-bright:#e2c079;
  --accent:#c98f4f; --accent-bright:#e6b877;
  --low:#6fa88a; --elev:#d8b45a; --crit:#d1705f;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(120% 80% at 50% -10%,#171009 0%,var(--ink) 55%);
  color:var(--text);font-family:var(--sans);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:var(--accent-bright);text-decoration:none}
.wrap{max-width:1000px;margin:0 auto;padding:0 20px}
.mono{font-family:var(--mono)}

/* top bar */
header{border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;
  background:color-mix(in srgb,var(--ink) 88%,transparent);backdrop-filter:blur(8px)}
.bar{display:flex;align-items:center;gap:14px;padding:14px 0}
.seal{width:38px;height:38px;flex:none}
.title{font-weight:650;font-size:19px;letter-spacing:-.01em}
.title small{color:var(--dim);font-weight:400;font-size:13px}
.spacer{flex:1}
.pill{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  border:1px solid var(--line2);color:var(--dim);border-radius:999px;padding:4px 11px}
.who{font-family:var(--mono);font-size:12px;color:var(--faint)}

/* demo banner */
.demo{background:color-mix(in srgb,var(--accent) 12%,transparent);border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);
  border-radius:8px;padding:9px 14px;margin:16px 0 4px;font-size:13px;color:var(--accent-bright)}

/* tabs */
nav.tabs{display:flex;gap:4px;margin:18px 0 8px;flex-wrap:wrap}
.tab{font-family:var(--mono);font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;
  padding:9px 15px;border:1px solid var(--line);border-radius:8px;color:var(--dim);cursor:pointer;background:none}
.tab:hover{border-color:var(--line2);color:var(--text)}
.tab.on{border-color:var(--accent);color:var(--accent-bright);background:color-mix(in srgb,var(--accent) 10%,transparent)}
.tab .n{display:inline-block;margin-left:6px;background:var(--accent);color:var(--ink);border-radius:999px;
  font-size:10px;padding:0 6px;font-weight:700;vertical-align:1px}

/* cards */
section{padding:8px 0 40px}
.grid{display:grid;gap:14px}
.card{background:linear-gradient(180deg,color-mix(in srgb,var(--panel) 70%,var(--ink)),var(--ink));
  border:1px solid var(--line);border-radius:12px;padding:18px}
.card h3{margin:0 0 2px;font-size:16px}
.muted{color:var(--dim);font-size:13.5px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.between{justify-content:space-between}
.kv{font-family:var(--mono);font-size:12px;color:var(--faint);word-break:break-all}

/* badges */
.badge{font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;
  padding:3px 9px;border-radius:999px;border:1px solid currentColor;white-space:nowrap}
.b-low{color:var(--low)} .b-elev{color:var(--elev)} .b-crit{color:var(--crit)}
.b-ok{color:var(--low)} .b-rej{color:var(--crit)} .b-off{color:var(--faint)}
.avatar{width:34px;height:34px;border-radius:50%;flex:none;display:grid;place-items:center;
  border:1.5px solid color-mix(in srgb,var(--accent) 55%,transparent);color:var(--accent);
  background:radial-gradient(circle at 50% 38%,color-mix(in srgb,var(--accent) 22%,transparent),transparent 70%);
  font-family:var(--mono);font-weight:700;font-size:14px}

/* proposal render */
.prop .action{background:#0d0a06;border:1px solid var(--line);border-radius:10px;padding:14px;margin:12px 0}
.prop .klabel{font-family:var(--mono);font-size:12px;color:var(--accent-bright);letter-spacing:.04em;margin-bottom:6px}
.prop .content{white-space:pre-wrap;word-break:break-word;font-size:15px}
.prop .tags{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:10px}
.warn{color:var(--crit);font-size:13px;margin-top:8px;display:flex;gap:7px;align-items:flex-start}
.ctx{color:var(--dim);font-size:13px;font-style:italic;margin-top:8px}
.fp{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:10px}
.hint{font-size:12px;color:var(--dim);margin-top:2px}

/* buttons */
.acts{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.btn{font-family:var(--mono);font-size:12.5px;letter-spacing:.05em;padding:10px 16px;border-radius:8px;
  border:1px solid var(--line2);color:var(--text);background:none;cursor:pointer}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--ink);font-weight:700}
.btn.primary:hover{background:var(--accent-bright)}
.btn.bunker{background:none;border-color:var(--crit);color:var(--accent-bright)}
.btn.bunker:hover{background:color-mix(in srgb,var(--crit) 16%,transparent)}
.btn.ghost{color:var(--dim)}
.btn.danger{border-color:color-mix(in srgb,var(--crit) 60%,transparent);color:var(--crit)}
.btn.danger:hover{background:color-mix(in srgb,var(--crit) 14%,transparent)}
.empty{color:var(--faint);text-align:center;padding:44px;border:1px dashed var(--line);border-radius:12px}

/* policy table */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
th{color:var(--dim);font-family:var(--mono);font-size:11px;letter-spacing:.09em;text-transform:uppercase;font-weight:600}
td .tierbtn{cursor:pointer;background:none;border:1px solid currentColor;border-radius:999px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px}
.req{font-family:var(--mono);font-size:11.5px;color:var(--faint)}
footer{color:var(--faint);font-size:12.5px;text-align:center;padding:26px 0 44px;border-top:1px solid var(--line)}
</style>
</head>
<body>
<header><div class="wrap bar">
  <svg class="seal" viewBox="0 0 100 100" aria-hidden="true">
    <rect x="2" y="2" width="96" height="96" rx="20" fill="#0b0906" stroke="#c39a56" stroke-width="2"/>
    <g fill="none" stroke="#c39a56" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
      <rect x="24" y="50" width="52" height="30" rx="3"/><line x1="24" y1="62" x2="76" y2="62" stroke-width="2.6"/><line x1="24" y1="71" x2="76" y2="71" stroke-width="2.6"/></g>
    <g transform="rotate(-15 26 45)"><rect x="24" y="35" width="52" height="12" rx="2.5" fill="none" stroke="#c39a56" stroke-width="4"/>
      <clipPath id="b"><rect x="24" y="35" width="52" height="12" rx="2.5"/></clipPath>
      <g clip-path="url(#b)" fill="#c39a56"><polygon points="21,47 31,47 43,35 33,35"/><polygon points="37,47 47,47 59,35 49,35"/><polygon points="53,47 63,47 75,35 65,35"/><polygon points="69,47 79,47 91,35 81,35"/></g></g>
  </svg>
  <div class="title">Nact <small>· control plane</small></div>
  <div class="spacer"></div>
  <span class="who" id="master"></span>
  <span class="pill">V1</span>
</div></header>

<div class="wrap">
  <div class="demo">Prototype wired to <b>sample data</b> — clicking Approve / Reject / Revoke updates local state only.
    The real app talks to the Nact runtime (the Luke/Nave service) behind a NIP-98–signed gate.</div>
  <nav class="tabs" id="tabs"></nav>
  <section id="view"></section>
</div>
<footer>Nact — the agent proposes, you enact it by signing · <a href="/">nact.nave.pub</a></footer>

<script>
// ---- seed state (stand-in for the runtime's real data) -------------------
const S = {
  master: 'jaf@dequalsf.com',
  identities: [
    { key:'luke', handle:'luke@nave.pub', npub:'npub1lyuqym67ztczd7xunupjednja9r05xmrrgvhmsrwvdw5duq5vedq44kfxv', signer:'custodial', status:'active' },
    { key:'nave', handle:'nave@nave.pub', npub:'npub1mr09rp9qjmjfk0mewvp93szl3la4dn038rqgk0rmpvrgtg8mjclqk5002v', signer:'custodial', status:'active' },
  ],
  channels: [
    { id:'tg', name:'Nave approvals', kind:'Telegram bot', approver:'jaf (472339615)', covers:['luke','nave'], status:'active' },
    { id:'dm', name:'Nostr DM', kind:'NIP-59 gift-wrap', approver:'npub1gqg…74pxs', covers:['luke','nave'], status:'active' },
  ],
  // risk tiers (defaults mirror src/inspect.mjs)
  policy: [
    { kind:1, label:'Note', tier:'low' },
    { kind:7, label:'Reaction', tier:'low' },
    { kind:6, label:'Repost', tier:'low' },
    { kind:9734, label:'Zap request', tier:'elevated' },
    { kind:0, label:'Profile / metadata edit', tier:'critical' },
    { kind:3, label:'Contact list (replaces follows)', tier:'critical' },
    { kind:5, label:'Deletion request', tier:'critical' },
    { kind:10002, label:'Relay list', tier:'critical' },
  ],
  queue: [
    { id:'NwE7', identity:'luke', kind:1, klabel:'Note', tier:'low',
      content:'shipped the WYSIWYS hardening today — the approval card now shows the exact bytes it will sign, with a fingerprint you can check against your signer.',
      tags:[], ctx:'ecosystem shipping — Phase 1 landed', fp:'a3f19c4e77b02d81', warns:[] },
    { id:'k92X', identity:'nave', kind:1, klabel:'Note', tier:'low',
      content:"Nact's control plane is live in V1 — construct approval channels, set risk tiers, and revoke an agent's authority to act. The agent proposes; you enact it by signing.",
      tags:[['t','nostrdev']], ctx:'launch note for the app', fp:'be5502aa1c9f3d40', warns:[] },
    { id:'Qz3m', identity:'nave', kind:0, klabel:'Profile / metadata edit', tier:'critical',
      content:'{"name":"Nave","about":"The Nave​ — sovereign data on nostr","picture":"https://nave.pub/assets/avatars/nave.png"}',
      tags:[], ctx:'refresh the bio', fp:'1f77d0be93ac2201',
      warns:['Profile / metadata edit — high-impact, verify carefully','1 hidden / bidi control character in content'] },
  ],
  history: [
    { id:'m8Ha', identity:'nave', klabel:'Note', outcome:'enacted', fp:'7c0a…f2', when:'today 20:18', relays:3 },
    { id:'p1Ld', identity:'luke', klabel:'Reaction', outcome:'enacted', fp:'44c8…9a', when:'today 17:02', relays:3 },
    { id:'x0Qe', identity:'luke', klabel:'Note', outcome:'rejected', fp:'22b1…03', when:'yesterday 08:41', relays:0 },
  ],
};
let tab = 'queue';
const $ = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild};
const esc = s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const tierBadge = t=>`<span class="badge b-${t==='critical'?'crit':t==='elevated'?'elev':'low'}">${t}</span>`;
const idOf = k=>S.identities.find(i=>i.key===k)||{handle:k};

function renderTabs(){
  const t=document.getElementById('tabs'); t.innerHTML='';
  const defs=[['queue','Queue',S.queue.length],['identities','Identities'],['channels','Channels'],['policy','Policy'],['history','History']];
  for(const [k,label,n] of defs){
    const b=$(`<button class="tab ${k===tab?'on':''}">${label}${n?`<span class="n">${n}</span>`:''}</button>`);
    b.onclick=()=>{tab=k;draw()}; t.appendChild(b);
  }
}
function proposalCard(p){
  const idn=idOf(p.identity);
  const crit=p.tier==='critical';
  const acts = crit
    ? `<button class="btn bunker" data-ok="${p.id}">🔐 Sign in bunker</button><button class="btn danger" data-no="${p.id}">Reject</button>`
    : `<button class="btn primary" data-ok="${p.id}">✅ Approve &amp; enact</button><button class="btn ghost" data-no="${p.id}">Reject</button>`;
  return `<div class="card prop">
    <div class="row between"><div class="row"><span class="avatar">${idn.handle[0].toUpperCase()}</span>
      <div><h3>Enact as ${esc(idn.handle)}</h3><div class="kv">${esc(idn.npub.slice(0,24))}…</div></div></div>${tierBadge(p.tier)}</div>
    <div class="action">
      <div class="klabel">${esc(p.klabel)}${crit?' — verify carefully':''}</div>
      <div class="content">${esc(p.content)}</div>
      ${p.tags.length?`<div class="tags">tags: ${esc(p.tags.map(t=>t.join(':')).join('   '))}</div>`:''}
      ${p.warns.map(w=>`<div class="warn">⚠️ <span>${esc(w)}</span></div>`).join('')}
      <div class="fp">id ${esc(p.fp)}… — the exact bytes; re-checked before signing</div>
    </div>
    <div class="ctx">context (not published): ${esc(p.ctx)}</div>
    ${crit?`<div class="hint">🔐 Critical action — no one-tap path. Approve on your bunker, which shows and signs the identical bytes.</div>`:''}
    <div class="acts">${acts}</div>
  </div>`;
}
function draw(){
  renderTabs();
  document.getElementById('master').textContent = S.master;
  const v=document.getElementById('view'); let h='';
  if(tab==='queue'){
    h = S.queue.length ? `<div class="grid">${S.queue.map(proposalCard).join('')}</div>`
      : `<div class="empty">Nothing awaiting approval. The agent will propose when it has something worth posting.</div>`;
  }
  if(tab==='identities'){
    h=`<div class="grid">${S.identities.map(i=>`<div class="card"><div class="row between">
      <div class="row"><span class="avatar">${i.handle[0].toUpperCase()}</span><div>
        <h3>${esc(i.handle)}</h3><div class="muted">signs via <b>${i.signer==='custodial'?'custodial key (SOPS-encrypted)':'NIP-46 bunker'}</b></div></div></div>
      <span class="badge ${i.status==='active'?'b-ok':'b-off'}">${i.status}</span></div>
      <div class="kv" style="margin:12px 0 6px">${esc(i.npub)}</div>
      <div class="acts"><button class="btn danger" data-revoke-id="${i.key}">Revoke authority (rotate key)</button></div></div>`).join('')}</div>`;
  }
  if(tab==='channels'){
    h=`<div class="grid">${S.channels.map(c=>`<div class="card"><div class="row between">
      <div><h3>${esc(c.name)}</h3><div class="muted">${esc(c.kind)} · approver <b>${esc(c.approver)}</b></div></div>
      <span class="badge ${c.status==='active'?'b-ok':'b-off'}">${c.status}</span></div>
      <div class="muted" style="margin-top:10px">covers: ${c.covers.map(k=>esc(idOf(k).handle)).join(', ')}</div>
      <div class="acts"><button class="btn danger" data-revoke-ch="${c.id}">Revoke channel</button></div></div>`).join('')}
      <div class="card" style="border-style:dashed;color:var(--dim)"><h3 style="color:var(--dim)">+ Construct a channel</h3>
      <div class="muted">Bind an approval channel (Telegram · NIP-59 DM · later Signal / Matrix / web-push) to one or more identities, with its own approver and scoped authority. Wired in the full app.</div></div></div>`;
  }
  if(tab==='policy'){
    h=`<div class="card"><div class="muted" style="margin-bottom:8px">Per-kind risk tiers. <b>Critical</b> kinds get no one-tap path — they require sign-on-device. Click a tier to cycle it.</div>
      <table><tr><th>Kind</th><th>Action</th><th>Tier</th><th>Required path</th></tr>
      ${S.policy.map((p,i)=>`<tr><td class="mono">${p.kind}</td><td>${esc(p.label)}</td>
        <td><button class="tierbtn ${p.tier==='critical'?'b-crit':p.tier==='elevated'?'b-elev':'b-low'}" data-tier="${i}">${p.tier}</button></td>
        <td class="req">${p.tier==='critical'?'sign-on-device':p.tier==='elevated'?'approve after full tags shown':'one-tap approve'}</td></tr>`).join('')}
      </table></div>`;
  }
  if(tab==='history'){
    h=`<div class="grid">${S.history.map(e=>`<div class="card"><div class="row between">
      <div class="row"><span class="avatar">${idOf(e.identity).handle[0].toUpperCase()}</span>
        <div><h3 style="font-size:15px">${esc(e.klabel)} · ${esc(idOf(e.identity).handle)}</h3>
        <div class="kv">id ${esc(e.fp)} · ${esc(e.when)}${e.outcome==='enacted'?` · ${e.relays} relays`:''}</div></div></div>
      <span class="badge ${e.outcome==='enacted'?'b-ok':'b-rej'}">${e.outcome}</span></div></div>`).join('')}</div>`;
  }
  v.innerHTML=h;
  // wire actions
  v.querySelectorAll('[data-ok]').forEach(b=>b.onclick=()=>decide(b.dataset.ok,'enacted'));
  v.querySelectorAll('[data-no]').forEach(b=>b.onclick=()=>decide(b.dataset.no,'rejected'));
  v.querySelectorAll('[data-revoke-id]').forEach(b=>b.onclick=()=>{const i=S.identities.find(x=>x.key===b.dataset.revokeId);i.status='revoked';draw()});
  v.querySelectorAll('[data-revoke-ch]').forEach(b=>b.onclick=()=>{const c=S.channels.find(x=>x.id===b.dataset.revokeCh);c.status='severed';draw()});
  v.querySelectorAll('[data-tier]').forEach(b=>b.onclick=()=>{const p=S.policy[+b.dataset.tier];
    p.tier={low:'elevated',elevated:'critical',critical:'low'}[p.tier];draw()});
}
function decide(id,outcome){
  const i=S.queue.findIndex(p=>p.id===id); if(i<0)return;
  const p=S.queue.splice(i,1)[0];
  S.history.unshift({id:p.id,identity:p.identity,klabel:p.klabel,outcome,fp:p.fp.slice(0,4)+'…'+p.fp.slice(-2),when:'just now',relays:outcome==='enacted'?3:0});
  draw();
}
draw();
</script>
</body>
</html>
